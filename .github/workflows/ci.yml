name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Unit tests
        run: go test ./...
      - name: Build
        run: go build ./...

  integration:
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: paygate
          POSTGRES_PASSWORD: paygate
          POSTGRES_DB: paygate
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U paygate -d paygate"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      PAYGATE_TEST_DB_URL: postgres://paygate:paygate@localhost:5432/paygate?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Integration tests
        run: go test -tags=integration ./...
